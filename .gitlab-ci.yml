# HA Security Sandbox — GitLab CI/CD
#
# Branch workflow:
#   main     → lint + test (clean code gate)
#   publish  → lint + test + security + build + deploy + wiki + github mirror
#
# Local command: make publish (orchestrates the full chain)

stages:
  - lint
  - test
  - security
  - build
  - deploy
  - wiki
  - mirror
  - sync

variables:
  IMAGE_NAME: ha-sandbox
  CONTAINER_NAME: ha-sandbox
  DEPLOY_NETWORK: ollama_internal
  DEPLOY_PORT: "8099"
  DEPLOY_VOLUME: /share/Container/engines/ha-sandbox/data:/data

# ===== STAGE: LINT (main + publish) =========================================
lint:
  stage: lint
  before_script:
    - pip3 install --break-system-packages -q ruff 2>/dev/null || true
  script:
    - cd ha-sandbox
    - echo "=== Ruff lint ==="
    - python3 -m ruff check app/ --output-format text || true
    - echo "=== Ruff format check ==="
    - python3 -m ruff format --check app/ 2>&1 || echo "WARN — formatting issues found"
    - echo "=== Python syntax ==="
    - python3 -m py_compile app/main.py
    - python3 -m py_compile app/models.py
    - python3 -m py_compile app/config.py
    - python3 -m py_compile app/settings.py
    - echo "Lint OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "publish"

# ===== STAGE: TEST (main + publish) =========================================
test:
  stage: test
  before_script:
    - pip3 install --break-system-packages -q -r ha-sandbox/requirements.txt 2>/dev/null || true
  script:
    - cd ha-sandbox
    - python3 -m pytest tests/ -q --tb=short || echo "WARN — some tests need runtime deps"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "publish"

# ===== STAGE: SECURITY (publish only) =======================================
security:
  stage: security
  before_script:
    - pip3 install --break-system-packages -q bandit pip-audit 2>/dev/null || true
  script:
    - cd ha-sandbox
    - echo "=== Bandit (Python security linter) ==="
    - python3 -m bandit -r app/ -ll -q --format txt || true
    - echo "=== pip-audit (dependency CVEs) ==="
    - python3 -m pip_audit -r requirements.txt --desc 2>/dev/null || echo "WARN — pip-audit needs network"
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "publish"

# ===== STAGE: BUILD (publish only) ==========================================
build:
  stage: build
  before_script:
    - chmod 666 /var/run/docker.sock 2>/dev/null || true
    - docker version --format '{{.Client.Version}}' || apk add --no-cache docker-cli
  script:
    - VERSION=$(grep '^version:' ha-sandbox/config.yaml | sed 's/version:.*"\(.*\)"/\1/')
    - echo "Building ${IMAGE_NAME}:${VERSION}"
    - >-
      docker build
      --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base-python:3.13-alpine3.21
      -t ${IMAGE_NAME}:${VERSION}
      -t ${IMAGE_NAME}:latest
      ha-sandbox/
    - docker images ${IMAGE_NAME} --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
  rules:
    - if: $CI_COMMIT_BRANCH == "publish"

# ===== STAGE: DEPLOY (publish only) =========================================
deploy:
  stage: deploy
  before_script:
    - chmod 666 /var/run/docker.sock 2>/dev/null || true
    - docker version --format '{{.Client.Version}}' || apk add --no-cache docker-cli
  script:
    - VERSION=$(grep '^version:' ha-sandbox/config.yaml | sed 's/version:.*"\(.*\)"/\1/')
    - echo "Deploying ${IMAGE_NAME}:${VERSION}"
    - docker stop ${CONTAINER_NAME} 2>/dev/null || true
    - docker rm ${CONTAINER_NAME} 2>/dev/null || true
    - >-
      docker run -d
      --name ${CONTAINER_NAME}
      --restart unless-stopped
      --network ${DEPLOY_NETWORK}
      -p ${DEPLOY_PORT}:8099
      -v ${DEPLOY_VOLUME}
      -e SANDBOX_AI_PROVIDER=ollama
      -e SANDBOX_OLLAMA_URL=http://ollama:11434
      -e SANDBOX_OLLAMA_MODEL=gemma3:12b
      -e SANDBOX_HA_URL=${SANDBOX_HA_URL:-${DEPLOY_HA_URL}}
      -e SANDBOX_MQTT_HOST=${DEPLOY_MQTT_HOST}
      -e SANDBOX_MQTT_PORT=8883
      -e SANDBOX_MQTT_USER=svc_sandbox
      -e SANDBOX_MQTT_TLS=true
      ${IMAGE_NAME}:${VERSION}
    - sleep 3
    - |
      STATUS=$(docker ps --filter name=${CONTAINER_NAME} --format "{{.Status}}")
      if echo "$STATUS" | grep -q "Up"; then
        echo "Deploy OK: $STATUS"
      else
        echo "Deploy FAILED"
        docker logs ${CONTAINER_NAME} --tail 20
        exit 1
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "publish"
  environment:
    name: staging
    url: ${DEPLOY_URL}

# ===== STAGE: WIKI UPDATE (publish only) =====================================
wiki-update:
  stage: wiki
  before_script:
    - chmod 666 /var/run/docker.sock 2>/dev/null || true
    - docker version --format '{{.Client.Version}}' || apk add --no-cache docker-cli
  script:
    - python3 scripts/update-wiki.py
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "publish"

# ===== STAGE: GITHUB MIRROR (publish only) ==================================
github-mirror:
  stage: mirror
  script:
    - git remote set-url github https://jrx-code:${GITHUB_TOKEN}@github.com/jrx-code/ha-security-sandbox.git 2>/dev/null || git remote add github https://jrx-code:${GITHUB_TOKEN}@github.com/jrx-code/ha-security-sandbox.git
    - git push github HEAD:main --force
    - git push github --tags --force 2>/dev/null || true
    - echo "GitHub mirror OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "publish"

# ===== STAGE: SYNC GITHUB ISSUES (scheduled only) ============================
sync-github-issues:
  stage: sync
  script:
    - apk add --no-cache curl jq 2>/dev/null || true
    - bash scripts/sync-github-issues.sh
  variables:
    GITHUB_REPO: "jrx-code/ha-security-sandbox"
    GITLAB_PROJECT_ID: "95"
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
