name: Sync GitHub Issues to GitLab

on:
  issues:
    types: [opened, reopened]

jobs:
  sync-to-gitlab:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitLab issue
        env:
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_ACTION: ${{ github.event.action }}
        run: |
          # Build description with GitHub reference
          DESCRIPTION="**Synced from GitHub** (${ISSUE_ACTION})\n\n"
          DESCRIPTION+="- **Author:** @${ISSUE_AUTHOR}\n"
          DESCRIPTION+="- **Original:** ${ISSUE_URL}\n\n"
          DESCRIPTION+="---\n\n"
          if [ -n "${ISSUE_BODY}" ] && [ "${ISSUE_BODY}" != "null" ]; then
            DESCRIPTION+="${ISSUE_BODY}"
          else
            DESCRIPTION+="*No description provided.*"
          fi

          # Create JSON payload
          PAYLOAD=$(jq -n \
            --arg title "${ISSUE_TITLE}" \
            --arg description "${DESCRIPTION}" \
            --arg labels "github" \
            '{title: $title, description: $description, labels: $labels}')

          # POST to GitLab API
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "${GITLAB_URL}/api/v4/projects/${GITLAB_PROJECT_ID}/issues" \
            -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}")

          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | sed '$d')

          if [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 300 ]; then
            GITLAB_ISSUE_URL=$(echo "${BODY}" | jq -r '.web_url')
            echo "GitLab issue created: ${GITLAB_ISSUE_URL}"
          else
            echo "Failed to create GitLab issue (HTTP ${HTTP_CODE})"
            echo "${BODY}" | jq . 2>/dev/null || echo "${BODY}"
            exit 1
          fi
