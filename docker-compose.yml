services:
  ha-sandbox:
    build: .
    container_name: ha-sandbox
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - SANDBOX_MQTT_HOST=${MQTT_HOST:-localhost}
      - SANDBOX_MQTT_PORT=${MQTT_PORT:-8883}
      - SANDBOX_MQTT_USER=${MQTT_USER:-}
      - SANDBOX_MQTT_PASS=${MQTT_PASS:-}
      - SANDBOX_OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - SANDBOX_OLLAMA_MODEL=${OLLAMA_MODEL:-gemma3:12b}
